version: "3.8"
services:
  lobsterpool:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - LP_PORT=8080
      - LP_DEV_MODE=true
      - LP_DB_PATH=/data/lobsterpool.db
      - LP_STATIC_DIR=/static
    volumes:
      - lobsterpool-data:/data

volumes:
  lobsterpool-data:
